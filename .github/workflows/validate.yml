name: Validate VPN Gate servers

on:
  schedule:
    # Every hour, on the hour (UTC).
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      tier3_count:
        description: "How many candidates to fully OpenVPN-test"
        required: false
        default: "150"

# Allow the job to commit results back to the repo.
permissions:
  contents: write

# Never run two validations at once; cancel an in-flight run if a new one starts.
concurrency:
  group: vpngate-validate
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      TIER3_COUNT: ${{ github.event.inputs.tier3_count || '150' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenVPN + tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl
          # Ensure the TUN device exists for OpenVPN.
          sudo mkdir -p /dev/net
          if [ ! -c /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
            sudo chmod 600 /dev/net/tun
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run validation pipeline
        run: |
          python -m src.main --tier3-count "${TIER3_COUNT}" -v

      - name: Commit results if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data state/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            ts="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git commit -m "chore: update validated VPN Gate servers (${ts})"
            git push
          fi
